worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;
pid /usr/local/openresty/nginx/logs/nginx.pid;

env LOCAL_SERVICE_URL;
env PARENT_SERVICE_URL;
env MAX_INFLIGHT;

events {
    worker_connections 1024;
}

http {
    # Required for lua-resty-http when connecting to Kubernetes service DNS names.
    resolver 10.43.0.10 valid=30s ipv6=off;
    resolver_timeout 5s;

    lua_package_path '/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/site/lualib/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;/usr/share/lua/5.1/?.lua;/usr/share/lua/5.1/?/init.lua;;';
    lua_package_cpath '/usr/local/openresty/site/lualib/?.so;/usr/local/openresty/lualib/?.so;/usr/lib/lua/5.1/?.so;;';

    init_by_lua_block {
        require "resty.http"
    }

    init_worker_by_lua_block {
        if ngx.worker.id() == 0 then
            ngx.timer.every(1, function()
                local counter = ngx.shared.inflight_60s_avg
                local inflight = counter:get("inflight") or 0
                local now = ngx.now()
                local slot = math.floor(now) % 60
                counter:set("s_t_" .. slot, now)
                counter:set("s_v_" .. slot, inflight)
            end)
        end
    }

    lua_shared_dict inflight_60s_avg 1m;

    log_format main '$remote_addr "$request" $status $body_bytes_sent';
    access_log /usr/local/openresty/nginx/logs/access.log main;

    client_body_buffer_size 10m;
    client_max_body_size    10m;

    server {
        listen 80;

        location = /proxy/status {
            content_by_lua_block {
                local counter = ngx.shared.inflight_60s_avg
                local inflight = counter:get("inflight") or 0
                local now = ngx.now()
                local total = 0
                local count = 0
                local peak = 0
                for i = 0, 59 do
                    local t = counter:get("s_t_" .. i)
                    local v = counter:get("s_v_" .. i)
                    if t and v and (now - t) <= 60 then
                        total = total + v
                        count = count + 1
                        if v > peak then
                            peak = v
                        end
                    end
                end
                local avg = count > 0 and (total / count) or nil
                local avg_str = avg ~= nil and tostring(avg) or "null"
                ngx.header.content_type = "application/json"
                ngx.say('{"inflight_requests":' .. inflight .. ',"inflight_60s_avg":' .. avg_str .. ',"inflight_60s_max":' .. peak .. '}')
            }
        }

        location = /proxy/health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location /predict {
            lua_need_request_body on;
            content_by_lua_file /usr/local/openresty/nginx/conf/lua/proxy.lua;
        }
    }
}
