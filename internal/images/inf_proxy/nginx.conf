worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    lua_shared_dict request_counter 1m;

    log_format main '$remote_addr "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    # Large body buffer for image uploads
    client_body_buffer_size 10m;
    client_max_body_size    20m;

    server {
        listen 80;

        # Proxy status for peer proxies to query
        location = /proxy/status {
            content_by_lua_block {
                local counter = ngx.shared.request_counter
                local inflight = counter:get("inflight") or 0
                ngx.header.content_type = "application/json"
                ngx.say('{"inflight_requests":' .. inflight .. '}')
            }
        }

        # Health check
        location = /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Main inference entry point — routing + proxying handled in Lua
        location /predict {
            lua_need_request_body on;
            content_by_lua_file /etc/nginx/lua/proxy.lua;
        }
    }
}
